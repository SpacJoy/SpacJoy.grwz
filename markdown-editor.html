		<header>

		<script>
			// 随机背景图数据配置
			const backgroundImages = {
				desktop: {
					bright: [
						'res/bright_back/bright_back.png',
						'res/bright_back/bright_back1.jpg',
						'res/bright_back/bright_back2.png',
						'res/bright_back/bright_back3.jpg',
						'res/bright_back/bright_back4.jpg',
						'res/bright_back/bright_back5.jpg',
						'res/bright_back/bright_back6.png'
					],
					dark: [
						'res/dark_back/dark_back.png',
						'res/dark_back/dark_back1.jpg',
						'res/dark_back/dark_back2.jpg',
						'res/dark_back/dark_back3.jpg',
						'res/dark_back/dark_back4.png',
						'res/dark_back/dark_back5.jpg'
					]
				},
				tablet: {
					bright: [
						'res/mobile_bright_back/mobile_bright_back.png.jpg',
						'res/mobile_bright_back/mobile_bright_back.png2.png',
						'res/mobile_bright_back/mobile_bright_back.png3.png',
						'res/mobile_bright_back/mobile_bright_back.png4.jpg',
						'res/mobile_bright_back/mobile_bright_back.png5.jpg',
						'res/mobile_bright_back/mobile_bright_back.png6.jpeg',
						'res/mobile_bright_back/mobile_bright_back.png7.jpg',
						'res/mobile_bright_back/mobile_bright_back.png8.png',
						'res/mobile_bright_back/mobile_bright_back.png10.jpg',
						'res/mobile_bright_back/mobile_bright_back.png12.png'
					],
					dark: [
						'res/mobile_dark_back/mobile_dark_back.jpg',
						'res/mobile_dark_back/mobile_dark_back1.jpg',
						'res/mobile_dark_back/mobile_dark_back2.jpg',
						'res/mobile_dark_back/mobile_dark_back3.jpg',
						'res/mobile_dark_back/mobile_dark_back4.jpg',
						'res/mobile_dark_back/mobile_dark_back5.png',
						'res/mobile_dark_back/mobile_dark_back6.jpeg'
					]
				},
				mobile: {
					bright: [
						'res/mobile_bright_back/mobile_bright_back.png.jpg',
						'res/mobile_bright_back/mobile_bright_back.png2.png',
						'res/mobile_bright_back/mobile_bright_back.png3.png',
						'res/mobile_bright_back/mobile_bright_back.png4.jpg',
						'res/mobile_bright_back/mobile_bright_back.png5.jpg',
						'res/mobile_bright_back/mobile_bright_back.png6.jpeg',
						'res/mobile_bright_back/mobile_bright_back.png7.jpg',
						'res/mobile_bright_back/mobile_bright_back.png8.png',
						'res/mobile_bright_back/mobile_bright_back.png10.jpg',
						'res/mobile_bright_back/mobile_bright_back.png12.png'
					],
					dark: [
						'res/mobile_dark_back/mobile_dark_back.jpg',
						'res/mobile_dark_back/mobile_dark_back1.jpg',
						'res/mobile_dark_back/mobile_dark_back2.jpg',
						'res/mobile_dark_back/mobile_dark_back3.jpg',
						'res/mobile_dark_back/mobile_dark_back4.jpg',
						'res/mobile_dark_back/mobile_dark_back5.png',
						'res/mobile_dark_back/mobile_dark_back6.jpeg'
					]
				}
			};

			// 获取随机背景图
			function getRandomBackground(layout, theme) {
				const images = backgroundImages[layout] && backgroundImages[layout][theme];
				if (!images || images.length === 0) {
					console.warn(`没有找到 ${layout}-${theme} 主题的背景图`);
					return null;
				}
				const randomIndex = Math.floor(Math.random() * images.length);
				return images[randomIndex];
			}

			// 设置背景图
			function setBackgroundImage(imageUrl) {
				if (imageUrl) {
					document.body.style.backgroundImage = `url('${imageUrl}')`;
					console.log(`背景图已设置为: ${imageUrl}`);
				}
			}

			// 随机选择加载GIF
			const loadingGifs = [
				{ src: "res/loading/Loading.gif", width: "400px", height: "400px" },
				{ src: "res/loading/Loading1.gif", width: "400px", height: "400px" },
				{ src: "res/loading/Loading2.gif", width: "400px", height: "400px" },
				{ src: "res/loading/Loading3.gif", width: "549px", height: "297px" },
				{ src: "res/loading/Loading4.gif", width: "200px", height: "240px" },
			];
			const randomGif =
				loadingGifs[Math.floor(Math.random() * loadingGifs.length)];
			const loadingImg = document.getElementById("loading-gif");
			loadingImg.src = randomGif.src;
			loadingImg.style.width = randomGif.width;
			loadingImg.style.height = randomGif.height;

			// 检测主容器布局变化并切换背景
			function checkLayoutAndSwitchBackground(forceNewBackground = false, forceLayoutCheck = false) {
				// 防止重复执行
				if (isBackgroundSwitching && !forceLayoutCheck) {
					console.log('⏸️ 背景切换正在执行中，跳过此次调用');
					return;
				}
				
				if (forceNewBackground || forceLayoutCheck) {
					isBackgroundSwitching = true;
				}
				
				// 检测设备类型和布局
				const screenWidth = window.innerWidth;
				const screenHeight = window.innerHeight;
				
				// 三种布局判断
				let layoutType, layoutClass;
				if (screenWidth <= 700) {
					layoutType = 'mobile';
					layoutClass = 'mobile-layout';
				} else if (screenWidth <= 1040) {
					layoutType = 'tablet';
					layoutClass = 'tablet-layout';
				} else {
					layoutType = 'desktop';
					layoutClass = 'desktop-layout';
				}
				
				// 检测当前布局是否发生了变化
				const currentLayoutClass = document.body.classList.contains('mobile-layout') ? 'mobile' :
										 document.body.classList.contains('tablet-layout') ? 'tablet' : 'desktop';
				const layoutChanged = currentLayoutClass !== layoutType;
				
				// 检测主题偏好（亮色/暗色）
				const prefersDarkScheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
				const theme = prefersDarkScheme ? 'dark' : 'bright';
				
				// 切换背景类
				document.body.classList.remove('mobile-layout', 'tablet-layout', 'desktop-layout');
				document.body.classList.add(layoutClass);
				
				// 设置背景图的条件：
				// 1. 强制要求新背景 (手动更换、初始化)
				// 2. 或者布局类型发生了变化 (移动端/平板端/桌面端切换)
				if (forceNewBackground || layoutChanged || forceLayoutCheck) {
					const randomBackground = getRandomBackground(layoutType, theme);
					// 设置随机背景图
					if (randomBackground) {
						setBackgroundImage(randomBackground);
					}
					
					// 详细调试信息
					console.log(`=== 布局检测详情 ===`);
					console.log(`屏幕尺寸: ${screenWidth}x${screenHeight}px`);
					console.log(`最终布局: ${layoutType.charAt(0).toUpperCase() + layoutType.slice(1)} (${layoutType === 'mobile' ? '移动端' : layoutType === 'tablet' ? '平板端' : '桌面端'}背景)`);
					console.log(`主题: ${theme}, 背景: ${randomBackground}`);
					if (layoutChanged) {
						console.log(`🔄 布局变化: ${currentLayoutClass} → ${layoutType}`);
					}
					console.log(`==================`);
				} else {
					// 仅调整布局类，不更换背景图
					console.log(`布局调整: ${layoutType.charAt(0).toUpperCase() + layoutType.slice(1)}, 主题: ${theme} (背景未更换)`);
				}
				
				// 重置标志
				isBackgroundSwitching = false;
			}

			// 防重复执行标志
			let isInitialized = false;
			let isBackgroundSwitching = false;
			let eventListenersAdded = false;

			// 统一的页面初始化函数，确保只执行一次
			function initializePageComplete() {
				if (isInitialized) {
					console.log('⏸️ 页面已初始化，跳过重复执行');
					return;
				}
				isInitialized = true;
				
				console.log('🚀 开始统一页面初始化');
				
				// 1. 初始化背景和布局
				checkLayoutAndSwitchBackground(true); // 初始化时设置背景图
				
				// 2. 添加事件监听器（只添加一次）
				if (!eventListenersAdded) {
					addEventListeners();
					eventListenersAdded = true;
				}
				
				// 3. 在800ms后隐藏 loader 并显示内容，启动其他功能
				setTimeout(function () {
					document.querySelector(".loader").style.display = "none";
					document.querySelector(".blur-effect").style.display = "none";
					
					console.log('✅ 页面初始化完成');
				}, 800);
			}

			// 添加所有事件监听器的函数
			function addEventListeners() {
				console.log('🎧 添加事件监听器');
				
				// 防抖的布局调整函数
				const debouncedLayoutAdjust = debounce(() => {
					checkLayoutAndSwitchBackground(false); // 窗口大小变化时不更换背景图，只调整布局
				}, 100);

				// 防抖的方向变化处理函数
				const debouncedOrientationChange = debounce(() => {
					console.log('📱 设备方向已变化，重新检测背景');
					checkLayoutAndSwitchBackground(true); // 方向变化时强制更换背景图
				}, 200);

				// 防抖的媒体查询变化处理函数
				const debouncedMediaQueryChange = debounce((e) => {
					console.log(`📱 媒体查询变化: ${e.matches ? '移动端' : '桌面端'}`);
					checkLayoutAndSwitchBackground(true); // 媒体查询变化时强制更换背景图
				}, 150);

				// 监听窗口大小变化
				window.addEventListener('resize', debouncedLayoutAdjust);

				// 监听设备方向变化（用于移动设备旋转）
				window.addEventListener('orientationchange', debouncedOrientationChange);

				// 监听媒体查询变化（更精确的响应式检测）
				const mobileMediaQuery = window.matchMedia('(max-width: 700px)');
				const tabletMediaQuery = window.matchMedia('(max-width: 1040px)');
				mobileMediaQuery.addListener(debouncedMediaQueryChange);
				tabletMediaQuery.addListener(debouncedMediaQueryChange);
				
				// 添加键盘快捷键支持（Ctrl+B 或 Cmd+B）
				window.addEventListener('keydown', function(e) {
					if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
						e.preventDefault();
						changeRandomBackground();
					}
				});
			}

			// 防抖函数 - 避免事件频繁触发
			function debounce(func, wait) {
				let timeout;
				return function executedFunction(...args) {
					const later = () => {
						clearTimeout(timeout);
						func(...args);
					};
					clearTimeout(timeout);
					timeout = setTimeout(later, wait);
				};
			}

			// 手动更换背景图功能
			function changeRandomBackground() {
				console.log('🎨 用户手动更换背景图');
				checkLayoutAndSwitchBackground(true); // 手动更换时强制选择新背景
				
				// 显示更换成功通知
				showBackgroundChangeNotification();
			}
			
			// 显示背景更换成功通知
			function showBackgroundChangeNotification() {
				const notification = document.createElement('div');
				notification.className = 'copy-notification success';
				notification.innerHTML = '🎨 背景图已更换！';
				notification.style.cssText = `
					position: fixed;
					top: 50%;
					left: 50%;
					transform: translate(-50%, -50%);
					background: rgba(76, 175, 80, 0.9);
					color: white;
					padding: 12px 24px;
					border-radius: 8px;
					font-size: 16px;
					z-index: 10000;
					opacity: 0;
					transition: opacity 0.3s ease;
				`;
				
				document.body.appendChild(notification);
				
				// 显示动画
				setTimeout(() => {
					notification.style.opacity = '1';
				}, 100);
				
				// 2秒后自动隐藏
				setTimeout(() => {
					notification.style.opacity = '0';
					setTimeout(() => {
						if (notification.parentNode) {
							document.body.removeChild(notification);
						}
					}, 300);
				}, 2000);
			}

			// 页面加载后启动初始化（只有一个入口）
			window.addEventListener('load', initializePageComplete);

			// Markdown功能初始化
			function initMarkdown() {
				const markdownInput = document.getElementById("markdown-input");
				const markdownOutput =
					document.getElementById("markdown-output");

				if (markdownInput && markdownOutput) {
					// 实时预览功能
					function updatePreview() {
						const markdownText = markdownInput.value;
						if (typeof marked !== "undefined") {
							markdownOutput.innerHTML =
								marked.parse(markdownText);
						} else {
							markdownOutput.innerHTML =
								'<p style="color: red;">Markdown库加载失败，请检查网络连接</p>';
						}
					}

					// 监听输入变化
					markdownInput.addEventListener("input", updatePreview);

					// 初始化默认内容
					markdownInput.value = `# 欢迎使用Markdown编辑器！

这是一个**实时预览**的Markdown编辑器。

## 支持的功能：
- **粗体文本**
- *斜体文本*
- [链接](https://github.com/chen6019)
- \`行内代码\`

### 代码块：
\`\`\`javascript
console.log("Hello, Markdown!");
\`\`\`

> 这是一个引用块

1. 有序列表项1
2. 有序列表项2

- 无序列表项
- 另一个列表项

### 表格支持：
| 功能 | 状态 | 描述 |
|------|------|------|
| 标题 | ✅ | 支持1-6级标题 |
| 粗体/斜体 | ✅ | 完全支持 |
| 链接 | ✅ | 内外链都支持 |
| 代码 | ✅ | 行内和块级 |

---

**提示：** 在左侧输入框中编辑Markdown，右侧会实时显示渲染效果！

**快捷键：** Ctrl+B 切换背景图 | Ctrl+S 保存 | Ctrl+B 粗体 | Ctrl+I 斜体`;

					// 初始化预览
					updatePreview();

					// 添加键盘快捷键
					markdownInput.addEventListener("keydown", function (e) {
						// Ctrl+S 或 Cmd+S 保存到本地存储
						if ((e.ctrlKey || e.metaKey) && e.key === "s") {
							e.preventDefault();
							localStorage.setItem(
								"markdown-content",
								markdownInput.value
							);
							showNotification("内容已保存到本地存储");
						}

						// Ctrl+A 全选
						if ((e.ctrlKey || e.metaKey) && e.key === "a") {
							e.preventDefault();
							markdownInput.select();
						}

						// Ctrl+Z 撤销 (浏览器默认行为)
						// Ctrl+Y 或 Ctrl+Shift+Z 重做 (浏览器默认行为)

						// Ctrl+D 复制当前行
						if ((e.ctrlKey || e.metaKey) && e.key === "d") {
							e.preventDefault();
							duplicateCurrentLine();
						}

						// Ctrl+L 选择当前行
						if ((e.ctrlKey || e.metaKey) && e.key === "l") {
							e.preventDefault();
							selectCurrentLine();
						}

						// Ctrl+Shift+K 删除当前行
						if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "K") {
							e.preventDefault();
							deleteCurrentLine();
						}

						// Ctrl+/ 切换行注释
						if ((e.ctrlKey || e.metaKey) && e.key === "/") {
							e.preventDefault();
							toggleLineComment();
						}

						// Ctrl+B 粗体 (但需要避免与背景切换冲突，所以在这里不处理背景切换)
						if ((e.ctrlKey || e.metaKey) && e.key === "b") {
							// 检查焦点是否在文本框内
							if (document.activeElement === markdownInput) {
								e.preventDefault();
								insertMarkdown("**", "**");
							}
							// 如果不在文本框内，让全局事件处理器处理背景切换
						}

						// Ctrl+I 斜体
						if ((e.ctrlKey || e.metaKey) && e.key === "i") {
							e.preventDefault();
							insertMarkdown("*", "*");
						}

						// Ctrl+K Ctrl+C 注释选中的行
						if ((e.ctrlKey || e.metaKey) && e.key === "k") {
							e.preventDefault();
							// 等待下一个按键
							waitForSecondKey(e);
						}

						// Alt+↑ 向上移动行
						if (e.altKey && e.key === "ArrowUp") {
							e.preventDefault();
							moveLineUp();
						}

						// Alt+↓ 向下移动行
						if (e.altKey && e.key === "ArrowDown") {
							e.preventDefault();
							moveLineDown();
						}

						// Ctrl+Enter 在下方插入新行
						if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
							e.preventDefault();
							insertNewLineBelow();
						}

						// Ctrl+Shift+Enter 在上方插入新行
						if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "Enter") {
							e.preventDefault();
							insertNewLineAbove();
						}

						// Tab键插入4个空格
						if (e.key === "Tab") {
							e.preventDefault();
							const start = markdownInput.selectionStart;
							const end = markdownInput.selectionEnd;
							markdownInput.value =
								markdownInput.value.substring(0, start) +
								"    " +
								markdownInput.value.substring(end);
							markdownInput.selectionStart =
								markdownInput.selectionEnd = start + 4;
						}

						// Shift+Tab 减少缩进
						if (e.shiftKey && e.key === "Tab") {
							e.preventDefault();
							removeIndentation();
						}
					});

					// 从本地存储恢复内容
					const savedContent =
						localStorage.getItem("markdown-content");
					if (savedContent) {
						markdownInput.value = savedContent;
						updatePreview();
					}
				}
			}

			// 显示通知
			function showNotification(message) {
				const notification = document.createElement("div");
				notification.className = "notification";
				notification.textContent = message;
				document.body.appendChild(notification);

				setTimeout(() => {
					notification.classList.add("show");
				}, 100);

				setTimeout(() => {
					notification.classList.remove("show");
					setTimeout(() => {
						document.body.removeChild(notification);
					}, 300);
				}, 2000);
			}

			// 显示通知
			function showNotification(message) {
				const notification = document.createElement("div");
				notification.className = "notification";
				notification.textContent = message;
				notification.style.cssText = `
					position: fixed;
					top: 50%;
					left: 50%;
					transform: translate(-50%, -50%);
					background: rgba(0, 123, 255, 0.9);
					color: white;
					padding: 12px 24px;
					border-radius: 8px;
					font-size: 16px;
					z-index: 10000;
					opacity: 0;
					transition: opacity 0.3s ease;
				`;
				document.body.appendChild(notification);

				setTimeout(() => {
					notification.style.opacity = '1';
				}, 100);

				setTimeout(() => {
					notification.style.opacity = '0';
					setTimeout(() => {
						if (notification.parentNode) {
							document.body.removeChild(notification);
						}
					}, 300);
				}, 2000);
			}

			// 页面加载完成后启动统一初始化
			window.addEventListener("load", function() {
				// 启动统一初始化
				initializePageComplete();
				
				// 延迟初始化Markdown功能，等待库加载完成
				setTimeout(initMarkdown, 100);
			});		</script>
		<main class="markdown-editor-main">
			<!-- Markdown编辑区域 -->
			<section class="markdown-section">
				<div class="markdown-container">
					<div class="markdown-input">
						<!-- 工具栏 -->
						<div class="toolbar">
							<button
								class="tool-btn"
								onclick="insertMarkdown('**', '**')"
								title="粗体"
							>
								<strong>B</strong>
							</button>
							<button
								class="tool-btn"
								onclick="insertMarkdown('*', '*')"
								title="斜体"
							>
								<em>I</em>
							</button>
							<button
								class="tool-btn"
								onclick="insertMarkdown('`', '`')"
								title="行内代码"
							>
								&lt;/&gt;
							</button>
							<button
								class="tool-btn"
								onclick="insertMarkdown('[', '](url)')"
								title="链接"
							>
								🔗
							</button>
							<button
								class="tool-btn"
								onclick="insertMarkdown('> ', '')"
								title="引用"
							>
								💬
							</button>
							<button
								class="tool-btn"
								onclick="insertMarkdown('- ', '')"
								title="列表"
							>
								📝
							</button>
							<button class="tool-btn" onclick="clearEditor()" title="清空">
								🗑️
							</button>
							<button
								class="tool-btn"
								onclick="downloadMarkdown()"
								title="下载"
							>
								💾
							</button>
							<button
								class="tool-btn"
								onclick="changeRandomBackground()"
								title="切换背景图 (Ctrl+B)"
							>
								🎨
							</button>
							<button
								class="tool-btn"
								onclick="showShortcutHelp()"
								title="快捷键帮助"
							>
								❓
							</button>
						</div>						<h3>
							输入区域
							<span class="shortcut-hint">快捷键: Ctrl+S保存 | Ctrl+B背景/粗体 | Ctrl+I斜体 | Ctrl+D复制行</span>
						</h3>						<textarea
							id="markdown-input"
							placeholder="在这里输入Markdown内容...&#10;&#10;支持的格式：&#10;# 标题&#10;**粗体** *斜体*&#10;- 列表项&#10;[链接](https://example.com)&#10;```代码块```&#10;&#10;快捷键提示：&#10;Ctrl+B: 切换背景/粗体 | Ctrl+S: 保存 | Ctrl+A: 全选&#10;Ctrl+I: 斜体 | Ctrl+D: 复制当前行 | Ctrl+L: 选择当前行&#10;Ctrl+Shift+K: 删除当前行&#10;Ctrl+/: 切换注释 | Alt+↑/↓: 移动行&#10;Ctrl+Enter: 下方插入行 | Ctrl+Shift+Enter: 上方插入行"
						></textarea>
					</div>
					<div class="markdown-output">
						<h3>预览区域</h3>
						<div id="markdown-output"></div>
					</div>
				</div>
			</section>
		</main>

		<footer>
			<!-- <p>网站内容归chen6019所有 &copy; 2025</p> -->
			<p>由 <a href="https://www.cloudflare.com/" target="_blank" style="color: #F6821E; text-decoration: none;">Cloudflare</a> 提供技术支持</p>
			<div style="margin-top: 10px;">
				<button class="btn" onclick="changeRandomBackground()" style="font-size: 12px; padding: 8px 16px; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); color: rgba(255, 255, 255, 0.9);" title="快捷键: Ctrl+B 或 Cmd+B">
					🎨 更换背景图
				</button>
			</div>
		</footer>

		<script>
			// 工具栏功能
			function insertMarkdown(before, after) {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const end = textarea.selectionEnd;
				const text = textarea.value;
				const selectedText = text.substring(start, end);

				textarea.value =
					text.substring(0, start) +
					before +
					selectedText +
					after +
					text.substring(end);
				textarea.focus();
				textarea.selectionStart = start + before.length;
				textarea.selectionEnd =
					start + before.length + selectedText.length;

				// 触发输入事件以更新预览
				textarea.dispatchEvent(new Event("input"));
			}

			function clearEditor() {
				if (confirm("确定要清空编辑器内容吗？")) {
					document.getElementById("markdown-input").value = "";
					document.getElementById("markdown-output").innerHTML = "";
				}
			}			function downloadMarkdown() {
				const content = document.getElementById("markdown-input").value;
				const blob = new Blob([content], { type: "text/markdown" });
				const url = URL.createObjectURL(blob);
				const a = document.createElement("a");
				a.href = url;
				a.download = "document.md";
				a.click();
				URL.revokeObjectURL(url);
			}

			// VSCode风格的编辑器快捷键功能
			function duplicateCurrentLine() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				// 找到当前行
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1; // +1 for \n
				}
				
				// 复制当前行
				const currentLine = lines[lineIndex];
				lines.splice(lineIndex + 1, 0, currentLine);
				
				textarea.value = lines.join('\n');
				// 将光标移到复制行的末尾
				const newPos = currentPos + currentLine.length + currentLine.length + 1;
				textarea.selectionStart = textarea.selectionEnd = newPos;
				textarea.dispatchEvent(new Event("input"));
			}

			function selectCurrentLine() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 选择整行
				const lineStart = currentPos;
				const lineEnd = currentPos + lines[lineIndex].length;
				textarea.selectionStart = lineStart;
				textarea.selectionEnd = lineEnd;
			}

			function deleteCurrentLine() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 删除当前行
				lines.splice(lineIndex, 1);
				textarea.value = lines.join('\n');
				
				// 将光标移到下一行开始
				textarea.selectionStart = textarea.selectionEnd = currentPos;
				textarea.dispatchEvent(new Event("input"));
			}

			function toggleLineComment() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const end = textarea.selectionEnd;
				const value = textarea.value;
				const lines = value.split('\n');
				
				// 找到选中的行范围
				let startLine = 0, endLine = 0;
				let currentPos = 0;
				
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start && startLine === 0) {
						startLine = i;
					}
					if (currentPos + lines[i].length >= end) {
						endLine = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 切换注释
				for (let i = startLine; i <= endLine; i++) {
					if (lines[i].startsWith('<!-- ') && lines[i].endsWith(' -->')) {
						// 取消注释
						lines[i] = lines[i].slice(5, -4);
					} else {
						// 添加注释
						lines[i] = '<!-- ' + lines[i] + ' -->';
					}
				}
				
				textarea.value = lines.join('\n');
				textarea.dispatchEvent(new Event("input"));
			}

			function moveLineUp() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 如果不是第一行，与上一行交换
				if (lineIndex > 0) {
					const temp = lines[lineIndex];
					lines[lineIndex] = lines[lineIndex - 1];
					lines[lineIndex - 1] = temp;
					
					textarea.value = lines.join('\n');
					// 重新计算光标位置
					const newPos = start - lines[lineIndex].length - 1;
					textarea.selectionStart = textarea.selectionEnd = newPos;
					textarea.dispatchEvent(new Event("input"));
				}
			}

			function moveLineDown() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 如果不是最后一行，与下一行交换
				if (lineIndex < lines.length - 1) {
					const temp = lines[lineIndex];
					lines[lineIndex] = lines[lineIndex + 1];
					lines[lineIndex + 1] = temp;
					
					textarea.value = lines.join('\n');
					// 重新计算光标位置
					const newPos = start + lines[lineIndex].length + 1;
					textarea.selectionStart = textarea.selectionEnd = newPos;
					textarea.dispatchEvent(new Event("input"));
				}
			}

			function insertNewLineBelow() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 在当前行下方插入新行
				lines.splice(lineIndex + 1, 0, '');
				textarea.value = lines.join('\n');
				
				// 将光标移到新行
				const newPos = currentPos + lines[lineIndex].length + 1;
				textarea.selectionStart = textarea.selectionEnd = newPos;
				textarea.dispatchEvent(new Event("input"));
			}

			function insertNewLineAbove() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const value = textarea.value;
				const lines = value.split('\n');
				
				let currentPos = 0;
				let lineIndex = 0;
				for (let i = 0; i < lines.length; i++) {
					if (currentPos + lines[i].length >= start) {
						lineIndex = i;
						break;
					}
					currentPos += lines[i].length + 1;
				}
				
				// 在当前行上方插入新行
				lines.splice(lineIndex, 0, '');
				textarea.value = lines.join('\n');
				
				// 将光标移到新行
				textarea.selectionStart = textarea.selectionEnd = currentPos;
				textarea.dispatchEvent(new Event("input"));
			}

			function removeIndentation() {
				const textarea = document.getElementById("markdown-input");
				const start = textarea.selectionStart;
				const end = textarea.selectionEnd;
				const value = textarea.value;
				
				if (start === end) {
					// 单行缩进处理
					const lineStart = value.lastIndexOf('\n', start - 1) + 1;
					const line = value.substring(lineStart, value.indexOf('\n', start));
					
					if (line.startsWith('    ')) {
						textarea.value = value.substring(0, lineStart) + 
							line.substring(4) + 
							value.substring(lineStart + line.length);
						textarea.selectionStart = textarea.selectionEnd = start - 4;
					} else if (line.startsWith('\t')) {
						textarea.value = value.substring(0, lineStart) + 
							line.substring(1) + 
							value.substring(lineStart + line.length);
						textarea.selectionStart = textarea.selectionEnd = start - 1;
					}
				} else {
					// 多行缩进处理
					const lines = value.split('\n');
					let currentPos = 0;
					let startLine = 0, endLine = 0;
					
					for (let i = 0; i < lines.length; i++) {
						if (currentPos + lines[i].length >= start && startLine === 0) {
							startLine = i;
						}
						if (currentPos + lines[i].length >= end) {
							endLine = i;
							break;
						}
						currentPos += lines[i].length + 1;
					}
					
					for (let i = startLine; i <= endLine; i++) {
						if (lines[i].startsWith('    ')) {
							lines[i] = lines[i].substring(4);
						} else if (lines[i].startsWith('\t')) {
							lines[i] = lines[i].substring(1);
						}
					}
					
					textarea.value = lines.join('\n');
				}
				
				textarea.dispatchEvent(new Event("input"));
			}

			function waitForSecondKey(firstEvent) {
				const textarea = document.getElementById("markdown-input");
				
				function handleSecondKey(e) {
					if (e.key === "c" && (e.ctrlKey || e.metaKey)) {
						e.preventDefault();
						toggleLineComment();
					}
					textarea.removeEventListener("keydown", handleSecondKey);
				}
				
				// 临时监听下一个按键
				setTimeout(() => {
					textarea.addEventListener("keydown", handleSecondKey);
				}, 0);
						// 3秒后移除监听器
				setTimeout(() => {
					textarea.removeEventListener("keydown", handleSecondKey);
				}, 3000);
			}

			// 显示快捷键帮助
			function showShortcutHelp() {
				const helpContent = `
📝 Markdown编辑器快捷键帮助

基本操作：
• Ctrl+S - 保存到本地存储
• Ctrl+A - 全选
• Ctrl+Z - 撤销 (浏览器默认)
• Ctrl+Y - 重做 (浏览器默认)

背景与格式化：
• Ctrl+B - 切换背景图 (焦点不在编辑框时) / 粗体 (焦点在编辑框时)
• Ctrl+I - 斜体 (*)
• Ctrl+/ - 切换行注释

行操作：
• Ctrl+D - 复制当前行
• Ctrl+L - 选择当前行
• Ctrl+Shift+K - 删除当前行
• Alt+↑ - 向上移动行
• Alt+↓ - 向下移动行

插入行：
• Ctrl+Enter - 在下方插入新行
• Ctrl+Shift+Enter - 在上方插入新行

缩进：
• Tab - 增加缩进 (4个空格)
• Shift+Tab - 减少缩进

高级：
• Ctrl+K Ctrl+C - 切换行注释

💡 提示：这些快捷键模仿了VSCode编辑器的行为，同时支持背景图切换功能！
				`;
				
				alert(helpContent);
			}
		</script>
