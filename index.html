<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title data-zh="喵~嗷呜~~！" data-en="Meow~? Awoo~~!">喵~嗷呜~~！</title>
	<link rel="icon" type="image/webp" href="https://ysy.spacjoy.top/icon/top.webp">
	<!-- 设置网页样式-->
	<link rel="stylesheet" type="text/css" href="css/main.css">
	<link rel="stylesheet" type="text/css" href="css/index.css">
	<!-- 使用本地 Markdown 解析器 -->
	<!-- 引入 Lenis 平滑滚动库 -->
	<script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
	<!-- 统一日志工具：尽早引入以供后续脚本使用 -->
	<script src="./js/logger.js"></script>
	<!-- marked.js 加载逻辑已移动至 js/readme.js（该模块会负责尝试加载 marked 并回退到本地解析器） -->



</head>

<body>
	<!-- 背景层容器 -->
	<div class="bg-layer-stack"></div>

	<!-- 加载覆盖层 -->
	<div class="loader">
		<img id="loading-gif" src="" alt="Loading...">
	</div>
	<!-- 悬浮窗组件 -->
	<div class="suspension-window" id="suspension-window">
		<div class="suspension-header">
			<div class="suspension-icon">!</div>
			<button class="suspension-close" id="suspension-close" title="关闭">×</button>
		</div>
		<div class="suspension-content">
			<p>因不可抗因素：硬盘损坏、数据丢失</br>"2406相册被迫关停"</p>
		</div>
	</div>

	<!-- 模糊效果覆盖层 -->
	<div class="blur-effect"></div>

	<!-- 顶部导航栏 - 固定位置 -->
	<header class="top-nav fixed-header">
		<div class="nav-container">
			<!-- 左上角Logo - 优化后的现代Logo -->
			<div class="nav-logo modern-logo">
				<div class="logo-inner">
					<img src="https://ysy.spacjoy.top/icon/top.webp" alt="Logo" class="logo-image">
					<div class="logo-glow"></div>
				</div>
			</div>

			<!-- 右上角控制按钮 - 优化样式 -->
			<div class="nav-controls modern-controls">
				<!-- 语言切换按钮 -->
				<div class="language-switch">
					<button id="lang-toggle" class="nav-btn modern-btn lang-btn" onclick="toggleLanguage()"
						title="切换语言 / Switch Language">
						<span id="lang-text">EN</span>
					</button>
				</div>

				<!-- 背景切换按钮 -->
				<div class="change-bg">
					<button id="bg-toggle" class="nav-btn modern-btn change-bg-btn" onclick="changeRandomBackground()"
						data-zh-title="更换背景 (Ctrl+B)\n不同设备/窗口会看到不同随机背景"
						data-en-title="Change Background (Ctrl+B)\nEach device/window sees its own random background"
						title="更换背景 (Ctrl+B)\n不同设备/窗口会看到不同随机背景">
						<span data-zh="🎨 更换背景(Ctrl+B)" data-en="🎨 Background(Ctrl+B)">🎨 更换背景(Ctrl+B)</span>
					</button>
				</div>
			</div>
		</div>
	</header>

	<!-- 第一屏：标语屏幕 -->
	<section class="section screen-section hero-screen" id="hero-section">
		<div class="typing-container">
			<span class="typing-text" data-zh="记忆塑造灵魂，灵魂影响记忆！"
				data-en="Memory shapes the soul, the soul influences memory!"></span>
		</div>
		<div class="scroll-indicator" id="scroll-indicator">
			<span class="scroll-text" data-zh="向下滚动探索" data-en="Scroll down to explore"></span>
			<div class="scroll-arrow"></div>
		</div>
	</section>
	<script src="./js/ui.js" defer></script>
	<script src="./js/lang.js" defer></script>
	<script src="./js/globals.js" defer></script>
	<script src="./js/loader.js" defer></script>
	<!-- 初始化 Lenis 平滑滚动效果 -->
	<script src="./js/scroll-animation.js"></script>
	<script src="./js/lenis-init.js"></script>
	<script src="./js/blur-transition.js"></script>
	<script src="./js/background.js" defer></script>
	<script src="./js/readme.js" defer></script>
	<script src="./js/local-markdown.js" defer></script>
	<script src="./js/servers.js" defer></script>
	<script src="./js/notifications.js" defer></script>
	<script src="./js/random-meme.js" defer></script>

	<!-- 打字效果和系统颜色响应 -->
	<script src="./js/typing-effect.js" defer></script>

	<script>
		// 页面加载完成后初始化打字效果和系统颜色
		document.addEventListener('DOMContentLoaded', function () {
			// 初始化页面效果 - 语言初始化已在ui.js的load事件中处理
			if (window.initPageEffects) {
				window.initPageEffects();
			}
		});
	</script>
	<!-- 第二屏：空白屏幕 -->
	<section class="section screen-section blank-screen" id="blank-section">
		<!-- 空白屏幕，仅包含背景和导航 -->
	</section>

	<!-- 第三屏：项目列表屏幕 -->
	<section class="section screen-section projects-screen" id="projects-section">
		<div class="section-header">
			<h2 data-zh="我的项目" data-en="My Projects"></h2>
		</div>
		<div class="projects-container">
			<article class="project-card">
				<h3><span data-zh="博客" data-en="Blog"></span> <span id="Blog-status"
						style="font-size: 0.8em; margin-left: 10px;">🔄 <span data-zh="检测中..."
							data-en="Checking..."></span></span></h3>
				<p data-zh="这是我新创建的博客" data-en="This is my newly created blog"></p>
				<p data-zh="我的小说会首先在这里发布" data-en="My novel will be published here first"></p>
				<p data-zh="我会不定期分享各种技术、图片上传到此"
					data-en="I will periodically share various technologies and upload pictures here."></p>
				<button class="btn modern-btn" onclick="window.open('https://blog.spacejoy.top', '_blank')"
					data-zh="前往博客" data-en="Go to Blog"></button>
				<button class="btn modern-btn" onclick="window.open('https://blog.spacjoy.top', '_blank')"
					data-zh="备用博客" data-en="Backup Blog"></button>
			</article>
			<article class="project-card">
				<!-- <h3 data-zh="影视" data-en="Film(TV)"></h3> -->
				<h3><span data-zh="MoonTV" data-en="MoonTV"></span> <span id="moon-primary-status">🔄
						<span data-zh="检测中..." data-en="Checking..."></span></span></h3>
				<p><span data-zh="备用" data-en="Spare"></span> <span id="moontv-status">🔄 <span data-zh="检测中..."
							data-en="Checking..."></span></span></p>
				<p data-zh="免费影视资源站点" data-en="Free Film Resources"></p>
				<p data-zh="自带跳广告,为了防止滥用,有访问密码"
					data-en="Comes with ad skipping; to prevent misuse, it requires an access password."></p>
				<!-- <p data-zh="" data-en=""></p> -->
				<button class="btn modern-btn" onclick="window.open('https://tv.spacejoy.top:1125', '_blank')"
					data-zh="前往MoonTV" data-en="Go to MoonTV"></button>
				<button class="btn modern-btn" onclick="window.open('https://moon-nf.netlify.app', '_blank')"
					data-zh="前往备用" data-en="Go to backup"></button>
				<button class="btn modern-btn" onclick="copyServerAddress('2012520')" data-zh="访问码"
					data-en="Access Code"></button>
			</article>
			<article class="project-card">
				<h3 data-zh="将 Windows 接入智能家居" data-en="Integrate Windows into smart home"></h3>
				<p data-zh="通过小爱同学、天猫精灵等智能家具设备" data-en="Via XiaoAi, Tmall Genie and other smart home devices"></p>
				<p data-zh="实现对 Windows 电脑的远程控制" data-en="Remote control of Windows computers"></p>
				<p data-zh="包括关机、锁定、启动自定义应用/脚本、服务管理、调节显示器亮度、音量等功能"
					data-en="Including shutdown, lock, launch apps/scripts, service management, display brightness, volume control">
				</p>
				<p data-zh="适合有远程自动化需求的用户。" data-en="Suitable for users with remote automation needs."></p>
				<button class="btn modern-btn"
					onclick="window.open('https://github.com/chen6019/Remote-Controls', '_blank')" data-zh="前往项目"
					data-en="Go to Project"></button>
			</article>
			<article class="project-card">
				<h3><span data-zh="飞牛影视" data-en="FeiNiu Media"></span> <span id="fnos-status"
						style="font-size: 0.8em; margin-left: 10px;">🔄 <span data-zh="检测中..."
							data-en="Checking..."></span></span></h3>
				<p data-zh="我的个人影视库,游客账号: tlbx" data-en="My personal movie and TV library, guest account: tlbx"></p>
				<p data-zh="服务器带宽有限加载较慢,望谅解"
					data-en="The server bandwidth is limited, so loading may be slow. We appreciate your understanding.">
				</p>
				<p data-zh="有手机客户端，支持下载到本地离线播放"
					data-en="There is a mobile app that supports downloading for offline playback."></p>
				<button class="btn modern-btn" onclick="window.open('https://ys.spacejoy.top:1125', '_blank')"
					data-zh="前往影视库" data-en="Go to Media Library"></button>
				<button class="btn modern-btn" onclick="window.open('https://ys.spacjoy.top:1125', '_blank')"
					data-zh="前往影视库(备用)" data-en="Go to Media Library(Spare)"></button>
				<button class="btn modern-btn" onclick="copyServerAddress('20120224')" data-zh="复制密码"
					data-en="Copy Password"></button>
			</article>
			<article class="project-card">
				<h3><span data-zh="随机表情包" data-en="Random Stickers"></span></h3>
				<div class="project-image-wrapper">
					<div id="photo-random-container" class="sticker-layer-container">
						<img src="https://rad.spacjoy.top/bqb/" alt="随机表情包" class="sticker-layer active project-image">
					</div>
				</div>
				<button class="btn modern-btn" onclick="refreshRandomPhoto()" data-zh="刷新图片"
					data-en="Refresh Image"></button>
			</article>
			<article class="project-card">
				<h3 data-zh="关于小说" data-en="About My Novel"></h3>
				<p data-zh="这是我写的一部小说。" data-en="This is a novel that I wrote."></p>
				<p data-zh="目前仍在撰写大纲，可能还需要好几年"
					data-en="Currently still writing the outline, it may take several more years."></p>
				<p data-zh="实际上，这也是我那不切实际的幻想。" data-en="In fact, this is also my unrealistic fantasy."></p>
				<button class="btn modern-btn" onclick="window.open('https://blog.spacjoy.top/', '_blank')"
					data-zh="前往文章(未公开)" data-en="Go to Github (Unpublished)"></button>
				<button class="btn modern-btn" onclick="window.open('https://blog.spacejoy.top/', '_blank')"
					data-zh="前往文章(备用)" data-en="Go to article (backup)"></button>
			</article>
		</div>
	</section>

	<!-- 第四屏：README屏幕 -->
	<section class="section screen-section readme-screen" id="readme-section">
		<div class="section-header">
			<h2 data-zh="关于我" data-en="About Me"></h2>
		</div>
		<div class="markdown-display-section">
			<div class="markdown-content" id="markdown-content">
				<div class="loading-readme">
					<p data-zh="正在加载个人简介..." data-en="Loading personal profile..."></p>
				</div>
			</div>
		</div>
	</section>
	<!-- 页面指示器组件 -->
	<div class="page-indicator" id="page-indicator">
		<div class="indicator-item" data-section="hero-section" data-zh="欢迎页" data-en="Welcome Page"></div>
		<div class="indicator-item" data-section="blank-section" data-zh="过渡页" data-en="Transition Page"></div>
		<div class="indicator-item" data-section="projects-section" data-zh="项目页" data-en="Projects Page"></div>
		<div class="indicator-item" data-section="readme-section" data-zh="关于页" data-en="About Page"></div>
	</div>

	<footer>
		<!-- 可在此放置其它底部信息 -->
	</footer>
</body>

</html>
